apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.4-alpine
          env:
            - { name: POSTGRES_DB, value: kubequeue }
            - { name: POSTGRES_USER, value: kubequeue }
            - { name: POSTGRES_PASSWORD, value: kubequeue }
          ports:
            - { name: postgres, containerPort: 5432 }
          readinessProbe:
            exec:
              command: [pg_isready, -U, kubequeue, -d, kubequeue]
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
