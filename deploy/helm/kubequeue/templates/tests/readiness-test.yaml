apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kubequeue.fullname" . }}-readiness-test
  labels:
    {{- include "kubequeue.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: readiness
      image: curlimages/curl:8.15.0
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -ec
        - |
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 2 \
            http://{{ include "kubequeue.fullname" . }}-api:8080/readyz
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 2 \
            http://{{ include "kubequeue.fullname" . }}-web:3000/
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: true
