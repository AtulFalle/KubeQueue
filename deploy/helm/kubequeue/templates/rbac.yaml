{{- if .Values.serviceAccount.create }}
{{- $root := . }}
{{- $watchNamespaces := splitList "," (default .Release.Namespace .Values.config.watchNamespaces) }}
{{- range $watchNamespace := $watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubequeue.fullname" $root }}-worker
  namespace: {{ trim $watchNamespace }}
  labels:
    {{- include "kubequeue.labels" $root | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubequeue.fullname" $root }}-worker
  namespace: {{ trim $watchNamespace }}
  labels:
    {{- include "kubequeue.labels" $root | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubequeue.serviceAccountName" $root }}
    namespace: {{ $root.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubequeue.fullname" $root }}-worker
{{- end }}
{{- end }}
