apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubequeue.fullname" . }}-web
  labels:
    {{- include "kubequeue.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubequeue.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "kubequeue.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: KUBEQUEUE_API_INTERNAL_URL
              value: http://{{ include "kubequeue.fullname" . }}-api:8080
            - name: KUBEQUEUE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubequeue.fullname" . }}-config
                  key: admin-token
                  optional: true
          volumeMounts:
            - name: next-cache
              mountPath: /app/apps/web/.next/cache
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      volumes:
        - name: next-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
