apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubequeue.fullname" . }}-api
  labels:
    {{- include "kubequeue.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
