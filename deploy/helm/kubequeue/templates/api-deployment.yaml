apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubequeue.fullname" . }}-api
  labels:
    {{- include "kubequeue.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        checksum/runtime-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/security-reference: {{ include "kubequeue.securityReferenceChecksum" . }}
      labels:
        app.kubernetes.io/name: {{ include "kubequeue.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "kubequeue.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ default .Chart.AppVersion .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "kubequeue.fullname" . }}-runtime
          env:
            - name: KUBEQUEUE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-config" (include "kubequeue.fullname" .)) .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            - name: KUBEQUEUE_SESSION_DIGEST_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubequeue.securitySecretName" . }}
                  key: {{ .Values.security.sessionDigestKey }}
            - name: KUBEQUEUE_SESSION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubequeue.securitySecretName" . }}
                  key: {{ .Values.security.credentialEncryptionKey }}
            - name: KUBEQUEUE_BFF_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubequeue.securitySecretName" . }}
                  key: {{ .Values.security.bffInternalKey }}
            - name: KUBEQUEUE_SERVICE_ACCOUNT_DIGEST_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubequeue.securitySecretName" . }}
                  key: {{ .Values.security.serviceAccountDigestKey }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
