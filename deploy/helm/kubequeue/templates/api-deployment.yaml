apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubequeue.fullname" . }}-api
  labels:
    {{- include "kubequeue.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubequeue.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "kubequeue.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KUBEQUEUE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-config" (include "kubequeue.fullname" .)) .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            - name: KUBEQUEUE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-config" (include "kubequeue.fullname" .)) .Values.config.adminTokenExistingSecret }}
                  key: {{ .Values.config.adminTokenExistingSecretKey }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
