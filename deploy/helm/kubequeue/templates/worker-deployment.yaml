apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubequeue.fullname" . }}-worker
  labels:
    {{- include "kubequeue.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubequeue.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "kubequeue.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: KUBEQUEUE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-config" (include "kubequeue.fullname" .)) .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            - name: KUBEQUEUE_WATCH_NAMESPACES
              value: {{ default .Release.Namespace .Values.config.watchNamespaces | quote }}
            - name: KUBEQUEUE_GLOBAL_CONCURRENCY
              value: {{ .Values.config.globalConcurrency | quote }}
            - name: KUBEQUEUE_NAMESPACE_CONCURRENCY
              value: {{ .Values.config.namespaceConcurrency | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
