        identityProviderId: { type: string, pattern: '^[a-z][a-z0-9_]{0,62}$' }
        code: { type: string, minLength: 1, maxLength: 8192 }
        pkceVerifier: { type: string, minLength: 43, maxLength: 128 }
        redirectUri: { type: string, format: uri, maxLength: 2048 }
    OIDCTokenExchange:
      type: object
      additionalProperties: false
      required: [identityProviderId, accessToken]
      properties:
        identityProviderId: { type: string, pattern: '^[a-z][a-z0-9_]{0,62}$' }
        accessToken: { type: string, minLength: 1, maxLength: 16384, writeOnly: true }
        refreshToken: { type: string, maxLength: 16384, writeOnly: true }
    OIDCAuthorizationMetadata:
      type: object
      additionalProperties: false
      required: [id, issuer, clientId, redirectUri, scopes]
      properties:
        id: { type: string, pattern: '^[a-z][a-z0-9_]{0,62}$' }
        issuer: { type: string, format: uri, maxLength: 2048 }
        clientId: { type: string, minLength: 1, maxLength: 256 }
        redirectUri: { type: string, format: uri, maxLength: 2048 }
        scopes: { type: string, minLength: 6, maxLength: 512 }
    CreateLocalBrowserSession:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username: { $ref: '#/components/schemas/LocalUsername' }
        password: { $ref: '#/components/schemas/LocalPasswordCredential' }
    ChangeLocalPassword:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { $ref: '#/components/schemas/LocalPasswordCredential' }
        newPassword: { $ref: '#/components/schemas/LocalPassword' }
    ResetLocalPassword:
      type: object
      additionalProperties: false
      required: [newPassword]
      properties:
        newPassword: { $ref: '#/components/schemas/LocalPassword' }
    CreateBrowserSession:
      type: object
      required: [identityProviderId, authenticationMethod, accessToken]
      properties:
        identityProviderId: { type: string, maxLength: 128 }
        authenticationMethod: { type: string, enum: [OIDC] }
        refreshToken:
          type: string
          minLength: 1
          maxLength: 16384
          writeOnly: true
        accessToken:
          type: string
          minLength: 1
          maxLength: 16384
          writeOnly: true
        rotateCredential:
          type: string
          minLength: 1
          maxLength: 256
          writeOnly: true
    CreatedBrowserSession:
      type: object
      required: [credential, session]
      properties:
        credential:
          type: string
          minLength: 1
          maxLength: 256
          writeOnly: true
        session: { $ref: '#/components/schemas/BrowserSession' }
    BrowserSession:
      type: object
      required:
        [
          principalId,
          installationId,
          authenticationMethod,
          csrfToken,
          idleExpiresAt,
          absoluteExpiresAt,
        ]
      properties:
        principalId: { type: string }
        installationId: { type: string }
        identityProviderId: { type: string }
        authenticationMethod: { type: string, enum: [LOCAL, OIDC] }
        csrfToken:
          type: string
          description: Non-secret, session-bound double-submit value for browser mutations.
          maxLength: 256
        idleExpiresAt: { type: string, format: date-time }
        absoluteExpiresAt: { type: string, format: date-time }
    BrowserSessionRefresh:
      allOf:
        - $ref: '#/components/schemas/BrowserSession'
        - type: object
          required: [refreshed]
          properties:
            refreshed:
              type: boolean
              description: Whether provider tokens were renewed during this request.
    WorkerState:
      type: string
      enum: [ready, degraded, unavailable]
    NamespaceAuthorityStatus:
      type: object
      required: [namespace, informerSynced, authorized]
      properties:
        namespace: { type: string }
        informerSynced: { type: boolean }
        authorized: { type: boolean }
        message: { type: string }
        observedAt: { type: string, format: date-time }
    SystemStatus:
      type: object
      required: [api, database, worker, watch, concurrency, releaseVersion, activeErrors]
      properties:
        api:
          type: object
          required: [ready]
          properties:
            ready: { type: boolean }
        database:
          type: object
          required: [ready]
          properties:
            ready: { type: boolean }
        worker:
          type: object
          required: [state]
          properties:
            state: { $ref: '#/components/schemas/WorkerState' }
            heartbeatAt: { type: string, format: date-time }
            lastSuccessfulReconciliationAt: { type: string, format: date-time }
        watch:
          type: object
          required: [mode, effectiveNamespaces, excludedNamespaces, namespaces]
          properties:
            mode: { type: string, enum: [selected, all] }
            effectiveNamespaces:
              type: array
              items: { type: string }
            excludedNamespaces:
              type: array
              items: { type: string }
            namespaces:
              type: array
              items: { $ref: '#/components/schemas/NamespaceAuthorityStatus' }
        concurrency:
          type: object
          required: [global, perNamespace]
          properties:
            global: { type: integer, minimum: 1 }
            perNamespace: { type: integer, minimum: 1 }
        releaseVersion: { type: string }
        activeErrors:
          type: array
          items:
            type: object
            required: [scope, code, message]
            properties:
              scope: { type: string }
              code: { type: string }
              message: { type: string }
    SupportDiagnostics:
      type: object
      required:
        [
          generatedAt,
          versions,
          schema,
          leadership,
          worker,
          watch,
          recentErrorClasses,
          auditWriterOverloadCount,
        ]
      properties:
        generatedAt: { type: string, format: date-time }
        versions:
          type: object
          required: [api, worker]
          properties:
            api: { type: string, maxLength: 128 }
            worker: { type: string, maxLength: 128 }
        schema:
          type: object
          required: [healthy, current, latest]
          properties:
            healthy: { type: boolean }
            current: { type: string, maxLength: 128 }
            latest: { type: string, maxLength: 128 }
        leadership:
          type: object
          required: [held, generation]
          properties:
            held: { type: boolean }
            generation: { type: integer, format: int64, minimum: 0 }
        worker:
          type: object
          required: [state]
          properties:
            state: { $ref: '#/components/schemas/WorkerState' }
            heartbeatAt: { type: string, format: date-time }
            lastSuccessfulReconciliationAt: { type: string, format: date-time }
        watch:
          type: object
          required: [mode, effectiveNamespaces, excludedNamespaces, namespaces]
          properties:
            mode: { type: string, enum: [selected, all] }
            effectiveNamespaces:
              type: array
              items: { type: string }
            excludedNamespaces:
              type: array
              items: { type: string }
            namespaces:
              type: array
              items: { $ref: '#/components/schemas/NamespaceAuthorityStatus' }
        recentErrorClasses:
          type: array
          maxItems: 20
          items:
            type: object
            required: [class, count]
            properties:
              class: { type: string, maxLength: 64 }
              count: { type: integer, format: int64, minimum: 1 }
              lastSeenAt: { type: string, format: date-time }
        auditWriterOverloadCount: { type: integer, format: int64, minimum: 0 }
    JobState:
      type: string
      enum: [CREATED, QUEUED, RUNNING, PAUSED, COMPLETED, FAILED, CANCELLED]
    ManagementMode:
      type: string
      enum: [MANAGED, OBSERVED, IGNORED, CONFLICTED]
    SynchronizationStatus:
      type: string
      enum: [SYNCED, PENDING, MISSING, STALE, ERROR, OUT_OF_SCOPE, CONFLICTED]
    Job:
      type: object
      required:
        [
          id,
          projectId,
          name,
          namespace,
          priority,
          position,
          desiredState,
          observedState,
          managementMode,
          syncStatus,
          actionPending,
          attempt,
          version,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        parentId: { type: string, format: uuid }
        name: { type: string }
        namespace: { type: string }
        team: { type: string }
        priority: { type: integer }
        position: { type: integer }
        desiredState: { $ref: '#/components/schemas/JobState' }
        observedState: { $ref: '#/components/schemas/JobState' }
        managementMode: { $ref: '#/components/schemas/ManagementMode' }
        syncStatus: { $ref: '#/components/schemas/SynchronizationStatus' }
        actionPending: { type: boolean }
        observedReason: { type: string }
        observedMessage: { type: string }
        observedAt: { type: string, format: date-time }
        lastError: { type: string }
        lastErrorCode: { type: string }
        errorRemediation: { type: string }
        scheduledFor: { type: string, format: date-time }
        kubernetesUid: { type: string }
        attempt: { type: integer }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    JobManifest:
      type: object
      required: [jobId, manifest]
      properties:
        jobId: { type: string, format: uuid }
        manifest:
          type: object
          additionalProperties: true
          description: Stored Kubernetes Job template with control-plane and resource-version fields omitted.
    JobList:
      type: object
      required: [items, count, queueVersion]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Job' }
        count: { type: integer }
        queueVersion: { type: integer, minimum: 0 }
    JobPage:
      type: object
      required: [items, count, queueVersion, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Job' }
        count:
          type: integer
          minimum: 0
          description: Number of items in this page.
        queueVersion: { type: integer, minimum: 0 }
        nextCursor:
          type: [string, 'null']
          description: Opaque continuation token, or null when this is the final page.
    JobFacets:
      type: object
      required: [total, observedStateCounts, namespaces, teams]
      properties:
        total: { type: integer, minimum: 0 }
        observedStateCounts:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        namespaces:
          type: array
          maxItems: 100
          description: At most the first 100 distinct non-empty namespaces in lexical order. The response does not indicate whether additional values were truncated.
          items: { type: string }
        teams:
          type: array
          maxItems: 100
          description: At most the first 100 distinct non-empty teams in lexical order. The response does not indicate whether additional values were truncated.
          items: { type: string }
    CreateJob:
      type: object
      required: [name, namespace, template]
      properties:
        name: { type: string, minLength: 1 }
        namespace: { type: string, minLength: 1 }
        team: { type: string }
        priority: { type: integer, minimum: -1000, maximum: 1000, default: 0 }
        scheduledFor: { type: string, format: date-time }
        template: { type: object, additionalProperties: true }
    JobEvent:
      type: object
      required: [id, jobId, type, message, createdAt]
      properties:
        id: { type: integer, minimum: 1 }
        jobId: { type: string, format: uuid }
        type: { type: string }
        message: { type: string }
        data: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
    JobEventPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          maxItems: 200
          description: Events in descending ID order (newest first).
          items: { $ref: '#/components/schemas/JobEvent' }
        nextCursor:
          type: [string, 'null']
          description: Opaque job-specific continuation token, or null when this is the final page.
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [requestId, error]
      properties:
        requestId: { $ref: '#/components/schemas/RequestId' }
        error:
          type: object
          additionalProperties: false
          required: [code, message, status, details]
          properties:
            code: { type: string, minLength: 1, maxLength: 96 }
            message: { type: string, minLength: 1, maxLength: 512 }
            status: { type: integer, minimum: 400, maximum: 599 }
            details:
              type: object
              maxProperties: 16
              propertyNames:
                pattern: '^[A-Za-z][A-Za-z0-9_.-]{0,63}$'
              additionalProperties:
                type: string
                maxLength: 512
