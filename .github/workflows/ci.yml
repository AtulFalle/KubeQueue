name: KubeQueue CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  CI: 'true'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_DAEMON: 'false'

jobs:
  quality:
    name: Format, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: kubequeue_test
          POSTGRES_PASSWORD: kubequeue
          POSTGRES_USER: kubequeue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kubequeue -d kubequeue_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      KUBEQUEUE_TEST_POSTGRES_URL: postgres://kubequeue:kubequeue@localhost:5432/kubequeue_test?sslmode=disable

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Set affected range
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base="${BASE_SHA}"
          elif [[ "${EVENT_NAME}" == "push" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            base="${BEFORE_SHA}"
          else
            base="$(git rev-parse HEAD~1)"
          fi
          printf 'NX_BASE=%s\nNX_HEAD=%s\n' "${base}" "${GITHUB_SHA}" >> "${GITHUB_ENV}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect affected projects
        id: affected
        shell: bash
        run: |
          affected_projects="$(pnpm nx show projects --affected --base="${NX_BASE}" --head="${NX_HEAD}")"
          printf '%s\n' "${affected_projects}"
          if grep -Fxq 'control-plane' <<< "${affected_projects}"; then
            echo "control_plane=true" >> "${GITHUB_OUTPUT}"
          else
            echo "control_plane=false" >> "${GITHUB_OUTPUT}"
          fi
          if grep -Fxq 'web' <<< "${affected_projects}"; then
            echo "web=true" >> "${GITHUB_OUTPUT}"
          else
            echo "web=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Go
        if: steps.affected.outputs.control_plane == 'true'
        uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: apps/control-plane/go.sum

      - name: Download Go dependencies
        if: steps.affected.outputs.control_plane == 'true'
        working-directory: apps/control-plane
        run: go mod download

      - name: Verify generated API client
        run: |
          pnpm nx run api-client:generate
          git diff --exit-code -- packages/api-client/src/generated.ts

      - name: Validate GitHub Actions workflows
        run: pnpm nx run deploy:workflow-lint

      - name: Check formatting and lint changed projects
        run: pnpm check:changed -- --base="${NX_BASE}" --head="${NX_HEAD}"

      - name: Type-check, test, and build affected non-web projects
        run: pnpm nx affected -t typecheck,test,build --exclude=web --base="${NX_BASE}" --head="${NX_HEAD}" --parallel=3

      - name: Type-check, test, and build web
        if: steps.affected.outputs.web == 'true'
        run: pnpm nx run-many -t typecheck,test,ci-build --projects=web --parallel=3
