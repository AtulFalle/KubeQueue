name: KubeQueue CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  NX_DAEMON: 'false'

jobs:
  quality:
    name: Validate, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.5
          cache: false

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3

      - name: Install JavaScript dependencies
        shell: bash
        run: |
          if [[ -f pnpm-lock.yaml ]]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
          pnpm rebuild

      - name: Download Go dependencies
        working-directory: apps/control-plane
        run: go mod download

      - name: Validate configuration
        shell: bash
        run: |
          unformatted="$(git ls-files -z '*.go' | xargs -0 gofmt -l)"
          if [[ -n "${unformatted}" ]]; then
            printf '%s\n' "${unformatted}"
            exit 1
          fi
          docker compose config --quiet
          pnpm nx run api-contract:lint
          helm lint deploy/helm/kubequeue
          helm template kubequeue deploy/helm/kubequeue

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2
          working-directory: apps/control-plane
          args: --timeout=5m

      - name: Lint TypeScript
        run: pnpm nx run-many -t lint --projects=web,api-client

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
