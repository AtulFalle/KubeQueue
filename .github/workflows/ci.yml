name: KubeQueue CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_DAEMON: 'false'

jobs:
  quality:
    name: Format, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Set affected range
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base="${BASE_SHA}"
          elif [[ "${EVENT_NAME}" == "push" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            base="${BEFORE_SHA}"
          else
            base="$(git rev-parse HEAD~1)"
          fi
          printf 'NX_BASE=%s\nNX_HEAD=%s\n' "${base}" "${GITHUB_SHA}" >> "${GITHUB_ENV}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect affected projects
        id: affected
        shell: bash
        run: |
          affected_projects="$(pnpm nx show projects --affected --base="${NX_BASE}" --head="${NX_HEAD}")"
          printf '%s\n' "${affected_projects}"
          if grep -Fxq 'control-plane' <<< "${affected_projects}"; then
            echo "control_plane=true" >> "${GITHUB_OUTPUT}"
          else
            echo "control_plane=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Go
        if: steps.affected.outputs.control_plane == 'true'
        uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.5

      - name: Download Go dependencies
        if: steps.affected.outputs.control_plane == 'true'
        working-directory: apps/control-plane
        run: go mod download

      - name: Check formatting and lint changed projects
        run: pnpm check:changed -- --base="${NX_BASE}" --head="${NX_HEAD}"

      - name: Test affected projects
        run: pnpm nx affected -t test --base="${NX_BASE}" --head="${NX_HEAD}"

      - name: Build affected projects
        run: pnpm nx affected -t build --base="${NX_BASE}" --head="${NX_HEAD}"
