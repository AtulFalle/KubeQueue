name: KubeQueue Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable release tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

env:
  CI: 'true'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_DAEMON: 'false'
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      release_sha: ${{ steps.release.outputs.sha }}
      release_tag: ${{ steps.release.outputs.tag }}
      release_version: ${{ steps.release.outputs.version }}
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: kubequeue_test
          POSTGRES_PASSWORD: kubequeue
          POSTGRES_USER: kubequeue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kubequeue -d kubequeue_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      KUBEQUEUE_TEST_POSTGRES_URL: postgres://kubequeue:kubequeue@localhost:5432/kubequeue_test?sslmode=disable

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag and release versions
        id: release
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tag must be a semantic version with a v prefix."
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          release_sha="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          node - "${version}" <<'NODE'
          const fs = require('node:fs');
          const version = process.argv[2];
          const manifests = [
            ['package.json', JSON.parse(fs.readFileSync('package.json', 'utf8')).version],
            ['apps/web/package.json', JSON.parse(fs.readFileSync('apps/web/package.json', 'utf8')).version],
            [
              'packages/api-client/package.json',
              JSON.parse(fs.readFileSync('packages/api-client/package.json', 'utf8')).version,
            ],
          ];
          const chart = fs.readFileSync('deploy/helm/kubequeue/Chart.yaml', 'utf8');
          manifests.push(
            ['deploy/helm/kubequeue/Chart.yaml version', chart.match(/^version:\s*'?([^'\s]+)'?/m)?.[1]],
            [
              'deploy/helm/kubequeue/Chart.yaml appVersion',
              chart.match(/^appVersion:\s*'?([^'\s]+)'?/m)?.[1],
            ],
          );
          const values = fs.readFileSync('deploy/helm/kubequeue/values.yaml', 'utf8');
          const imageTags = [...values.matchAll(/^    tag:\s*(.+)$/gm)].map((match) => match[1]);
          if (imageTags.length !== 3) {
            throw new Error(`deploy/helm/kubequeue/values.yaml has ${imageTags.length} image tags; expected 3`);
          }
          imageTags.forEach((tag, index) => {
            manifests.push([`deploy/helm/kubequeue/values.yaml image tag ${index + 1}`, tag]);
          });
          for (const [source, actual] of manifests) {
            if (actual !== version) {
              throw new Error(`${source} is ${actual ?? 'missing'}; expected ${version}`);
            }
          }
          NODE
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "sha=${release_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.5

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          go -C apps/control-plane mod download

      - name: Check synchronized release metadata
        run: pnpm nx run deploy:release-version-check -- "${RELEASE_TAG#v}"

      - name: Validate formatting and generated client
        shell: bash
        run: |
          pnpm format:check
          pnpm nx run control-plane:format-check
          pnpm nx run api-client:generate
          git diff --exit-code -- packages/api-client/src/generated.ts

      - name: Lint, type-check, test, and build
        run: pnpm check

      - name: Validate and package chart
        shell: bash
        run: |
          pnpm nx run deploy:release-validate
          if grep -E '(:dev|0\.0\.0|image: "kubequeue-)' dist/release/kubequeue-rendered.yaml; then
            echo "Rendered chart contains a development image or version."
            exit 1
          fi

      - name: Build production images
        run: |
          docker build -f apps/control-plane/Dockerfile --build-arg TARGET=api -t kubequeue-api:release-test .
          docker build -f apps/control-plane/Dockerfile --build-arg TARGET=worker -t kubequeue-worker:release-test .
          docker build -f apps/web/Dockerfile -t kubequeue-web:release-test .

      - name: Scan production images
        shell: bash
        run: |
          for image in kubequeue-api:release-test kubequeue-worker:release-test kubequeue-web:release-test; do
            docker run --rm \
              --volume /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.72.0 image \
              --scanners vuln \
              --severity CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              "${image}"
          done

      - name: Smoke-test API and web images
        shell: bash
        run: |
          docker run --rm --network host \
            -e KUBEQUEUE_DATABASE_URL="${KUBEQUEUE_TEST_POSTGRES_URL}" \
            -e KUBEQUEUE_ADMIN_TOKEN=release-validation-token \
            --name kubequeue-api-smoke \
            kubequeue-api:release-test &
          api_pid=$!
          docker run --rm --network host \
            -e KUBEQUEUE_API_INTERNAL_URL=http://127.0.0.1:8080 \
            -e KUBEQUEUE_ADMIN_TOKEN=release-validation-token \
            --name kubequeue-web-smoke \
            kubequeue-web:release-test &
          web_pid=$!
          trap 'docker rm -f kubequeue-api-smoke kubequeue-web-smoke >/dev/null 2>&1 || true; wait "${api_pid}" "${web_pid}" 2>/dev/null || true' EXIT
          for _ in {1..60}; do
            api_ready=false
            web_ready=false
            curl --fail --silent http://127.0.0.1:8080/readyz >/dev/null && api_ready=true
            curl --fail --silent http://127.0.0.1:3000 >/dev/null && web_ready=true
            if [[ "${api_ready}" == "true" && "${web_ready}" == "true" ]]; then
              exit 0
            fi
            sleep 2
          done
          docker logs kubequeue-api-smoke || true
          docker logs kubequeue-web-smoke || true
          exit 1

  publish-images:
    name: Publish ${{ matrix.name }} image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: kubequeue-api
            file: apps/control-plane/Dockerfile
            build_args: |
              TARGET=api
          - name: worker
            image: kubequeue-worker
            file: apps/control-plane/Dockerfile
            build_args: |
              TARGET=worker
          - name: web
            image: kubequeue-web
            file: apps/web/Dockerfile
            build_args: ''

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.release_tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/atulfalle/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate.outputs.release_tag }}
            type=raw,value=sha-${{ needs.validate.outputs.release_sha }}
          labels: |
            org.opencontainers.image.title=KubeQueue ${{ matrix.name }}
            org.opencontainers.image.description=KubeQueue experimental developer preview
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and publish image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: mode=max
          sbom: true

  publish-chart:
    name: Publish Helm chart and GitHub release
    needs:
      - validate
      - publish-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.release_tag }}

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package and publish chart
        shell: bash
        run: |
          mkdir -p dist
          pnpm nx run deploy:helm-package
          sha256sum "dist/kubequeue-${RELEASE_TAG#v}.tgz" > "dist/kubequeue-${RELEASE_TAG#v}.tgz.sha256"
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          helm push "dist/kubequeue-${RELEASE_TAG#v}.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/charts"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create preview release
        shell: bash
        run: |
          gh release create "${RELEASE_TAG}" \
            dist/kubequeue-*.tgz \
            dist/kubequeue-*.tgz.sha256 \
            --prerelease \
            --generate-notes \
            --title "KubeQueue ${RELEASE_TAG}" \
            --notes "$(cat <<EOF
          KubeQueue ${RELEASE_TAG} is an experimental developer preview.

          Keep the dashboard cluster-private. This release does not provide production support,
          backward-compatible upgrades, or multi-user authorization. See the attached chart and
          repository installation guide for prerequisites and limitations.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
