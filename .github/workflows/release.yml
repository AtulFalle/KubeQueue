name: KubeQueue Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Unused semantic release tag, including the v prefix
        required: true
        type: string
      release_sha:
        description: Exact successful master commit to publish
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  CI: 'true'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_DAEMON: 'false'
  RELEASE_SHA: ${{ inputs.release_sha }}
  RELEASE_TAG: ${{ inputs.release_tag }}

jobs:
  validate:
    name: Validate release source and chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release_sha: ${{ steps.release.outputs.sha }}
      release_tag: ${{ steps.release.outputs.tag }}
      release_version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - name: Verify immutable release inputs
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tag must be a semantic version with a v prefix."
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "${RELEASE_SHA}" ]]; then
            echo "Checked-out commit does not match release_sha."
            exit 1
          fi

          git fetch origin master
          if ! git merge-base --is-ancestor "${RELEASE_SHA}" origin/master; then
            echo "Release commit ${RELEASE_SHA} is not contained in master."
            exit 1
          fi

          successful_run="$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow ci.yml \
            --branch master \
            --commit "${RELEASE_SHA}" \
            --event push \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')"
          if [[ -z "${successful_run}" ]]; then
            echo "Release commit ${RELEASE_SHA} has no successful master push CI run."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            existing_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "${existing_sha}" != "${RELEASE_SHA}" ]]; then
              echo "${RELEASE_TAG} already points to ${existing_sha}, not ${RELEASE_SHA}."
              exit 1
            fi
          fi

          {
            echo "sha=${RELEASE_SHA}"
            echo "tag=${RELEASE_TAG}"
            echo "version=${RELEASE_TAG#v}"
          } >> "${GITHUB_OUTPUT}"
          echo "Verified master CI run ${successful_run} for ${RELEASE_SHA}."

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated API client
        run: |
          pnpm nx run api-client:generate
          git diff --exit-code -- packages/api-client/src/generated.ts

      - name: Validate release chart
        env:
          KUBEQUEUE_RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          pnpm nx run deploy:release-validate
          if grep -E '(:dev|:0\.0\.0|image: "kubequeue-)' dist/release/kubequeue-rendered.yaml; then
            echo "Rendered chart contains a development image or version."
            exit 1
          fi

  build-images:
    name: Build ${{ matrix.name }} image once
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: kubequeue-api
            file: apps/control-plane/Dockerfile
            build_args: |
              TARGET=api
          - name: worker
            image: kubequeue-worker
            file: apps/control-plane/Dockerfile
            build_args: |
              TARGET=worker
          - name: web
            image: kubequeue-web
            file: apps/web/Dockerfile
            build_args: ''

    steps:
      - name: Check out release commit
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.release_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Check for existing commit-addressed image
        id: candidate
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
        run: |
          if docker buildx imagetools inspect "ghcr.io/atulfalle/${{ matrix.image }}:sha-${RELEASE_SHA}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Preserving existing immutable commit-addressed image."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push commit-addressed image
        if: steps.candidate.outputs.exists != 'true'
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: ghcr.io/atulfalle/${{ matrix.image }}:sha-${{ needs.validate.outputs.release_sha }}
          labels: |
            org.opencontainers.image.title=KubeQueue ${{ matrix.name }}
            org.opencontainers.image.description=KubeQueue experimental developer preview
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ needs.validate.outputs.release_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true

  validate-images:
    name: Scan and smoke-test built images
    needs:
      - validate
      - build-images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: kubequeue_test
          POSTGRES_PASSWORD: kubequeue
          POSTGRES_USER: kubequeue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kubequeue -d kubequeue_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull commit-addressed images
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
        run: |
          docker pull "ghcr.io/atulfalle/kubequeue-api:sha-${RELEASE_SHA}"
          docker pull "ghcr.io/atulfalle/kubequeue-worker:sha-${RELEASE_SHA}"
          docker pull "ghcr.io/atulfalle/kubequeue-web:sha-${RELEASE_SHA}"

      - name: Scan production images
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
        run: |
          for image in kubequeue-api kubequeue-worker kubequeue-web; do
            docker run --rm \
              --volume /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.72.0 image \
              --scanners vuln \
              --severity CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              "ghcr.io/atulfalle/${image}:sha-${RELEASE_SHA}"
          done

      - name: Smoke-test API and web images
        shell: bash
        env:
          KUBEQUEUE_TEST_POSTGRES_URL: postgres://kubequeue:kubequeue@localhost:5432/kubequeue_test?sslmode=disable
          RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
        run: |
          docker run --rm --network host \
            -e KUBEQUEUE_DATABASE_URL="${KUBEQUEUE_TEST_POSTGRES_URL}" \
            -e KUBEQUEUE_ADMIN_TOKEN=release-validation-token \
            --name kubequeue-api-smoke \
            "ghcr.io/atulfalle/kubequeue-api:sha-${RELEASE_SHA}" &
          api_pid=$!
          docker run --rm --network host \
            -e KUBEQUEUE_API_INTERNAL_URL=http://127.0.0.1:8080 \
            -e KUBEQUEUE_ADMIN_TOKEN=release-validation-token \
            --name kubequeue-web-smoke \
            "ghcr.io/atulfalle/kubequeue-web:sha-${RELEASE_SHA}" &
          web_pid=$!
          trap 'docker rm -f kubequeue-api-smoke kubequeue-web-smoke >/dev/null 2>&1 || true; wait "${api_pid}" "${web_pid}" 2>/dev/null || true' EXIT
          for _ in {1..60}; do
            api_ready=false
            web_ready=false
            curl --fail --silent http://127.0.0.1:8080/readyz >/dev/null && api_ready=true
            curl --fail --silent http://127.0.0.1:3000 >/dev/null && web_ready=true
            if [[ "${api_ready}" == "true" && "${web_ready}" == "true" ]]; then
              exit 0
            fi
            sleep 2
          done
          docker logs kubequeue-api-smoke || true
          docker logs kubequeue-web-smoke || true
          exit 1

  create-tag:
    name: Create immutable release tag
    needs:
      - validate
      - validate-images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.release_sha }}

      - name: Create or verify tag
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            existing_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "${existing_sha}" != "${RELEASE_SHA}" ]]; then
              echo "${RELEASE_TAG} already points to ${existing_sha}, not ${RELEASE_SHA}."
              exit 1
            fi
            echo "${RELEASE_TAG} already points to the verified release commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${RELEASE_SHA}" -m "KubeQueue ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

  publish-images:
    name: Publish ${{ matrix.name }} version tag
    needs:
      - validate
      - create-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: kubequeue-api
          - name: worker
            image: kubequeue-worker
          - name: web
            image: kubequeue-web

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Promote tested image without rebuilding
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          versioned_image="ghcr.io/atulfalle/${{ matrix.image }}:${RELEASE_VERSION}"
          if docker buildx imagetools inspect "${versioned_image}" >/dev/null 2>&1; then
            echo "${versioned_image} already exists; preserving the immutable artifact."
          else
            docker buildx imagetools create \
              --tag "${versioned_image}" \
              "ghcr.io/atulfalle/${{ matrix.image }}:sha-${RELEASE_SHA}"
          fi

  publish-chart:
    name: Publish Helm chart and GitHub release
    needs:
      - validate
      - create-tag
      - publish-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate.outputs.release_sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package chart
        env:
          KUBEQUEUE_RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: pnpm nx run deploy:helm-package

      - name: Publish chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          if helm show chart oci://ghcr.io/atulfalle/charts/kubequeue --version "${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Chart ${RELEASE_VERSION} already exists; preserving the immutable artifact."
            rm "dist/kubequeue-${RELEASE_VERSION}.tgz"
            helm pull oci://ghcr.io/atulfalle/charts/kubequeue \
              --version "${RELEASE_VERSION}" \
              --destination dist
          else
            helm push "dist/kubequeue-${RELEASE_VERSION}.tgz" "oci://ghcr.io/atulfalle/charts"
          fi
          sha256sum "dist/kubequeue-${RELEASE_VERSION}.tgz" > "dist/kubequeue-${RELEASE_VERSION}.tgz.sha256"

      - name: Create or update preview release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            for asset in \
              "dist/kubequeue-${RELEASE_VERSION}.tgz" \
              "dist/kubequeue-${RELEASE_VERSION}.tgz.sha256"; do
              asset_name="${asset##*/}"
              if gh release view "${RELEASE_TAG}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq '.assets[].name' | grep -Fxq "${asset_name}"; then
                echo "${asset_name} already exists; preserving the immutable release asset."
              else
                gh release upload "${RELEASE_TAG}" "${asset}" --repo "${GITHUB_REPOSITORY}"
              fi
            done
          else
            gh release create "${RELEASE_TAG}" \
              "dist/kubequeue-${RELEASE_VERSION}.tgz" \
              "dist/kubequeue-${RELEASE_VERSION}.tgz.sha256" \
              --prerelease \
              --generate-notes \
              --repo "${GITHUB_REPOSITORY}" \
              --title "KubeQueue ${RELEASE_TAG}" \
              --notes "KubeQueue ${RELEASE_TAG} is an experimental developer preview. Keep the dashboard cluster-private; this release does not provide production support, backward-compatible upgrades, or multi-user authorization."
          fi
