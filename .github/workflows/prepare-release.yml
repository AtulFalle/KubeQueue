name: Start KubeQueue Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Unused semantic release tag, including the v prefix (for example, v0.2.0)
        required: true
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: prepare-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  start:
    name: Verify master and start publication
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out master
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: master

      - name: Verify release input and master CI
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "release_tag must be a semantic version with a v prefix, such as v0.2.0."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "${RELEASE_TAG} already exists and cannot be reused for different source."
            exit 1
          fi

          release_sha="$(git rev-parse HEAD)"
          successful_run="$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow ci.yml \
            --branch master \
            --commit "${release_sha}" \
            --event push \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')"
          if [[ -z "${successful_run}" ]]; then
            echo "Master commit ${release_sha} does not have a successful push CI run."
            echo "Wait for KubeQueue CI to finish successfully, then retry this workflow."
            exit 1
          fi

          echo "sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "version=${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"
          echo "Verified master commit ${release_sha} with CI run ${successful_run}."

      - name: Dispatch release publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref master \
            -f release_sha="${RELEASE_SHA}" \
            -f release_tag="${RELEASE_TAG}"
          echo "Dispatched ${RELEASE_TAG} from verified master commit ${RELEASE_SHA}."
